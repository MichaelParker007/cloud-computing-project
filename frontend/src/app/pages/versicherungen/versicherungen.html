<div class="page-container">
  <header class="header">
    <div class="header-content">
      <span class="logo">🛡️ Versicherungs-Hub</span>
      <button class="logout-btn" (click)="onLogout()">Abmelden</button>
    </div>
  </header>

  <main class="main-content">
    <h2>Meine Versicherungen</h2>

    <div class="cards-grid">
      <div class="card" *ngFor="let v of versicherungen">
        <h3>{{ v.typ }}</h3>
        <p>Anbieter: {{ v.anbieter }}</p>
        <p>Preis: {{ v.preis }} € / Monat</p>
      </div>
    </div>
  </main>
</div>
